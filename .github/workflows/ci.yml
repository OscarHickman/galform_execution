name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install GSL
        run: sudo apt-get update && sudo apt-get install -y libgsl-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run Ruff (lint and syntax)
        run: |
          ruff check galform_execution

      - name: Run isort (import order check)
        run: |
          isort --check-only galform_execution

      - name: Run Black (format check)
        run: |
          # Black's safety check can fail on newer-targeted source when running
          # on an older Python. Explicitly target the runner Python (3.12) so
          # formatting is compared using the correct grammar.
          black --check --target-version py312 galform_execution

      - name: Build package
        run: |
          python -m pip install build
          python -m build

      - name: Run tests
        run: |
          pytest tests
