name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Install GSL
        run: sudo apt-get update && sudo apt-get install -y libgsl-dev

      - name: Install dependencies
        run: |
          uv pip install -r requirements.txt
          uv pip install -e .

      - name: Run Ruff (lint and syntax)
        run: |
          uv run ruff check galform_execution

      - name: Run isort (import order check)
        run: |
          uv run isort --check-only galform_execution

      - name: Run Black (format check)
        run: |
          # Black's safety check can fail on newer-targeted source when running
          # on an older Python. Explicitly target the runner Python (312) so
          # formatting is compared using the correct grammar.
          uv run black --check --target-version py312 galform_execution

      - name: Build package
        run: |
          uv build

      - name: Run tests
        run: |
          uv run pytest tests
