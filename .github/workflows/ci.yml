name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install GSL
        run: sudo apt-get update && sudo apt-get install -y libgsl-dev

      - name: Install dependencies
        run: |
          uv pip install -r requirements.txt
          uv pip install -e .

      - name: Run Ruff (lint and syntax)
        run: |
          uv run ruff check galform_execution

      - name: Run isort (import order check)
        run: |
          uv run isort --check-only galform_execution

      - name: Run Black (format check)
        run: |
          uv run black --check galform_execution tests

      - name: Build package
        run: |
          uv build

      - name: Run tests
        run: |
          uv run pytest tests
